<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Multi-Modello</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="chat-header">🧠 IA Chatbot</div>
    
    <div id="settings-area">
        <label for="model-select">Modello IA:</label>
        <select id="model-select">
            <option value="HuggingFaceH4/zephyr-7b-beta">Zephyr 7B (Consigliato, molto stabile)</option>
            <option value="mistralai/Mistral-7B-Instruct-v0.3">Mistral 7B Instruct</option>
            <option value="Qwen/Qwen2.5-7B-Instruct">Qwen 2.5 (7B)</option>
            <option value="microsoft/Phi-3-mini-4k-instruct">Phi-3 Mini (Microsoft)</option>
        </select>
    </div>
    
    <div id="chat-box">
        <div class="message bot-message">Ciao! Scegli un modello dal menu qui in alto e iniziamo a chattare.</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Scrivi un messaggio..." autocomplete="off">
        <button id="send-btn">➔</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
