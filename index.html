<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Colab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="chat-header">🚀 IA Server Privato (Colab)</div>
    
    <div id="settings-area">
        <label for="colab-url">URL di Colab:</label>
        <input type="text" id="colab-url" placeholder="Incolla qui l'URL di Ngrok (es. https://xyz.ngrok-free.app)" autocomplete="off">
    </div>
    
    <div id="chat-box">
        <div class="message bot-message">Avvia lo script su Google Colab, copia l'URL che appare in verde, incollalo qui sopra e scrivimi!</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Scrivi un messaggio..." autocomplete="off">
        <button id="send-btn">➔</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
