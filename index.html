<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Phi-4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="chat-header">🧠 Assistente Phi-4</div>
    
    <div id="chat-box">
        <div class="message bot-message">Ciao! Sono pronto. Cosa vuoi chiedermi?</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Scrivi un messaggio..." autocomplete="off">
        <button id="send-btn">➔</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
